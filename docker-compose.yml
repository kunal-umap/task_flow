services:
  db:
    image: postgres:15
    container_name: taskflow_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./Backend
    container_name: taskflow_backend
    depends_on:
      - db
    ports:
      - "${APP_PORT}:${APP_PORT}"
    env_file:
      - .env
volumes:
  db_data:
